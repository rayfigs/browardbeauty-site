<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printable QR Cards — JT Cuts Academy</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333C4E;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .no-print {
      text-align: center;
      margin-bottom: 24px;
    }
    .print-btn {
      padding: 12px 32px;
      background: #FFCB02;
      color: #333C4E;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .print-btn:hover { background: #E6B800; }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      border: 1px dashed #ccc;
      padding: 24px 16px;
      text-align: center;
      background: white;
      break-inside: avoid;
    }
    .card .brand {
      font-size: 11px;
      font-weight: 700;
      color: #FFCB02;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .card canvas {
      display: block;
      margin: 0 auto 12px;
    }
    .card .hook-line {
      font-size: 14px;
      font-weight: 700;
      color: #333C4E;
      line-height: 1.3;
      margin-bottom: 8px;
      min-height: 38px;
    }
    .card .url-text {
      font-size: 13px;
      font-weight: 600;
      color: #005DA7;
      margin-bottom: 4px;
    }
    .card .event-text {
      font-size: 10px;
      color: #999;
    }
    .section-header {
      grid-column: 1 / -1;
      text-align: center;
      padding: 16px 0 8px;
      font-size: 16px;
      font-weight: 700;
      color: #333C4E;
      background: #f5f5f5;
    }

    @media print {
      body { background: white; padding: 0; }
      .no-print { display: none; }
      .card {
        border: 1px dashed #ccc;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .card .brand {
        color: #FFCB02 !important;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<h1>JT Cuts Academy — Printable QR Cards</h1>
<p class="subtitle">Cut along dashed lines. Each card has a QR code + hook line + URL.</p>

<div class="no-print">
  <button class="print-btn" onclick="window.print()">Print This Page</button>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<script>
var BASE = 'https://browardbeauty.com';

var allCards = [
  // Video page QR cards
  { type: 'video', label: 'Video 1', hook: 'What if college is the blind spot?', url: BASE + '/1', display: 'browardbeauty.com/1' },
  { type: 'video', label: 'Video 2', hook: 'The $250K mistake nobody\'s calculating', url: BASE + '/2', display: 'browardbeauty.com/2' },
  { type: 'video', label: 'Video 3', hook: 'Your "safe" career might not survive 2027', url: BASE + '/3', display: 'browardbeauty.com/3' },
  { type: 'video', label: 'Video 4', hook: 'You have the skill. Here\'s what\'s missing.', url: BASE + '/4', display: 'browardbeauty.com/4' },
  { type: 'video', label: 'Video 5', hook: 'Need income in 6 months, not 4 years?', url: BASE + '/5', display: 'browardbeauty.com/5' },
  // Quiz QR cards
  { type: 'quiz', label: 'Quiz — Table', hook: 'What\'s Your #1 Career Path Blind Spot?', url: BASE + '/quiz?hook=blindspot&src=table', display: 'browardbeauty.com/quiz' },
  { type: 'quiz', label: 'Quiz — Brochure', hook: 'What\'s Your #1 Career Path Blind Spot?', url: BASE + '/quiz?hook=blindspot&src=brochure', display: 'browardbeauty.com/quiz' },
  { type: 'quiz', label: 'Quiz — Handout', hook: 'Which Career Choices Are Limiting Your Income?', url: BASE + '/quiz?hook=holdback&src=handout', display: 'browardbeauty.com/quiz' },
  { type: 'quiz', label: 'Quiz — Social', hook: 'Which Career Launch Type Are You?', url: BASE + '/quiz?hook=type&src=social', display: 'browardbeauty.com/quiz' },
  { type: 'quiz', label: 'Quiz — Flyer', hook: 'What\'s Your Career Readiness Score?', url: BASE + '/quiz?hook=score&src=flyer', display: 'browardbeauty.com/quiz' },
];

var grid = document.getElementById('cardsGrid');

// Section header for videos
var vh = document.createElement('div');
vh.className = 'section-header';
vh.textContent = 'Video Pages — Scan to Watch';
grid.appendChild(vh);

allCards.forEach(function(card, i) {
  // Section header for quiz cards
  if (i === 5) {
    var qh = document.createElement('div');
    qh.className = 'section-header';
    qh.textContent = 'Quiz — Scan to Take the Quiz';
    grid.appendChild(qh);
  }

  var el = document.createElement('div');
  el.className = 'card';
  el.innerHTML =
    '<div class="brand">JT Cuts Academy</div>' +
    '<canvas id="qr-' + i + '"></canvas>' +
    '<div class="hook-line">"' + card.hook + '"</div>' +
    '<div class="url-text">' + card.display + '</div>' +
    '<div class="event-text">College, Careers & Beyond — March 18 & 20, 2026</div>';
  grid.appendChild(el);

  setTimeout(function() {
    QRCode.toCanvas(document.getElementById('qr-' + i), card.url, {
      width: 180,
      margin: 2,
      color: { dark: '#333C4E', light: '#ffffff' }
    });
  }, 100);
});
</script>

</body>
</html>
